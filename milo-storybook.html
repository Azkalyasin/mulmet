<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebatnya Menjadi Dokter Hewan - Interactive Storybook</title>
    <!-- Google Fonts for child-friendly typography -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --primary-dark: #1b5e20;
            --accent: #ff9800;
            --accent-light: #fff3e0;
            --accent-dark: #e65100;
            --bg-gradient: linear-gradient(135deg, #fffde7 0%, #e8f5e9 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --font-main: 'Fredoka', 'Comic Sans MS', sans-serif;
            --shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--primary-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- HOMEPAGE STYLES --- */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
        }

        .home-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            max-width: 650px;
            width: 100%;
            border: 4px solid #a5d6a7;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .home-emoji {
            font-size: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.1));
            animation: float 3s infinite ease-in-out;
        }

        .home-title {
            font-size: 38px;
            color: var(--primary-dark);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .home-subtitle {
            font-size: 20px;
            color: #558b2f;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .role-section {
            margin-bottom: 30px;
            background: var(--primary-light);
            padding: 15px 25px;
            border-radius: 16px;
            width: 100%;
            border: 2px dashed #81c784;
        }

        .role-section h3 {
            font-size: 16px;
            color: var(--primary-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 14px;
            text-align: left;
        }

        .role-item strong {
            color: var(--primary-dark);
            display: block;
        }

        .role-item span {
            color: #555;
            font-size: 13px;
        }

        .home-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
        }

        .start-btn {
            padding: 16px 45px;
            font-size: 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
            transition: var(--transition);
            font-family: inherit;
        }

        .start-btn:hover {
            transform: scale(1.05) translateY(-3px);
            background: var(--primary-dark);
            box-shadow: 0 12px 25px rgba(46, 125, 50, 0.4);
        }

        /* Auto-voiceover Switch */
        .voice-toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 16px;
            color: #37474f;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* --- STORY SCREEN STYLES --- */
        #story-screen {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeInStory 0.5s forwards;
            padding: 20px;
        }

        @keyframes fadeInStory {
            to { opacity: 1; }
        }

        .container {
            width: 95vw;
            height: 90vh;
            max-width: 1200px;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            border: 6px solid white;
            position: relative;
        }

        /* Split Layout */
        .illustration-side {
            flex: 1.1;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-right: 4px solid #a5d6a7;
            overflow: hidden;
        }

        .text-side {
            flex: 0.9;
            padding: 35px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: white;
            overflow-y: auto;
        }

        /* --- NARRATIVE TYPOGRAPHY --- */
        .scene-title {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 15px;
            border-bottom: 3px dashed #c8e6c9;
            padding-bottom: 10px;
            font-weight: 700;
        }

        .narrative-text {
            font-size: 18px;
            line-height: 1.6;
            color: #37474f;
            margin-bottom: 20px;
        }

        .narrative-text p {
            margin-bottom: 12px;
        }

        /* --- NAVIGATION CONTROLS --- */
        .controls {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 2px solid #f1f8e9;
        }

        .audio-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
            transition: var(--transition);
        }

        .audio-btn:hover {
            transform: scale(1.1);
            background: var(--accent-dark);
            box-shadow: 0 6px 15px rgba(255, 152, 0, 0.4);
        }

        .audio-btn.speaking {
            animation: pulse-orange 1.5s infinite;
            background: #e65100;
        }

        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(230, 81, 0, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(230, 81, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 81, 0, 0); }
        }

        .navigation {
            display: flex;
            gap: 15px;
        }

        .nav-button {
            padding: 12px 28px;
            font-size: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 700;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(46, 125, 50, 0.3);
        }

        .nav-button:disabled {
            background: #cfd8dc;
            color: #90a4ae;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* --- VISUAL ELEMENTS & ANIMATIONS --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* Scene 1: Bedroom */
        .visual-room {
            width: 100%;
            height: 100%;
            background: #fff9c4;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 40px;
            overflow: hidden;
        }

        .window {
            position: absolute;
            top: 40px;
            left: 50px;
            width: 120px;
            height: 90px;
            background: #80deea;
            border: 6px solid #8d6e63;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sun {
            font-size: 32px;
            animation: spin 20s infinite linear;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .cat {
            font-size: 130px;
            position: absolute;
            bottom: 40px;
            left: 20%;
            z-index: 10;
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .ball {
            font-size: 60px;
            position: absolute;
            bottom: 45px;
            right: 20%;
            z-index: 10;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .ball-roll {
            animation: rollBall 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .cat-chase {
            animation: chaseBall 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes rollBall {
            0% { right: 20%; transform: rotate(0deg); }
            50% { right: 60%; transform: rotate(-360deg); }
            100% { right: 20%; transform: rotate(-720deg); }
        }

        @keyframes chaseBall {
            0% { left: 20%; transform: scaleX(1); }
            25% { left: 35%; transform: translateY(-50px) scaleX(1); }
            50% { left: 50%; transform: translateY(0) scaleX(-1); }
            75% { left: 35%; transform: translateY(-50px) scaleX(-1); }
            100% { left: 20%; transform: translateY(0) scaleX(1); }
        }

        .click-hint {
            position: absolute;
            bottom: 10px;
            font-size: 16px;
            color: var(--primary-dark);
            background: rgba(255,255,255,0.8);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px dashed var(--primary);
            animation: pulse 1.5s infinite;
        }

        /* Speech Bubble */
        .speech-bubble {
            position: absolute;
            background: white;
            border-radius: 16px;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 16px;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 2px solid var(--primary);
            bottom: 180px;
            left: 20%;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .speech-bubble.show {
            opacity: 1;
            transform: scale(1);
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 12px solid transparent;
            border-top-color: white;
            border-bottom: 0;
            border-left: 0;
            margin-left: -6px;
            margin-bottom: -12px;
        }

        /* Scene 2: Sick Milo */
        .visual-sick-room {
            width: 100%;
            height: 100%;
            background: #eceff1;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .pillow {
            width: 220px;
            height: 80px;
            background: #90caf9;
            border-radius: 50% / 30%;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            position: absolute;
            bottom: 60px;
            border: 3px solid #64b5f6;
        }

        .cat-sick {
            font-size: 110px;
            position: absolute;
            bottom: 90px;
            animation: slow-sigh 4s infinite ease-in-out;
        }

        @keyframes slow-sigh {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(0.95) rotate(-3deg); }
        }

        .bowl-untouched {
            font-size: 50px;
            position: absolute;
            bottom: 40px;
            right: 20%;
            animation: float 2s infinite ease-in-out;
        }

        /* Scene 3: Travel */
        .visual-travel {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #bbdefb 0%, #e8f5e9 100%);
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .road-container {
            width: 100%;
            height: 80px;
            background: #90a4ae;
            position: absolute;
            bottom: 0;
            border-top: 4px solid #b0bec5;
        }

        .road-lines {
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #fff 0, #fff 20px, transparent 20px, transparent 40px);
            position: absolute;
            top: 50%;
            margin-top: -2px;
            animation: drive 1.5s infinite linear;
        }

        @keyframes drive {
            100% { background-position: -40px 0; }
        }

        .carrier-basket {
            font-size: 110px;
            position: relative;
            bottom: 20px;
            cursor: pointer;
            animation: wobble 2s infinite ease-in-out;
            transition: var(--transition);
        }

        .carrier-basket:hover {
            transform: scale(1.05);
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        /* Scene 4: Clinic Lobby */
        .visual-lobby {
            width: 100%;
            height: 100%;
            background: #e0f2f1;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            padding-bottom: 30px;
        }

        .lobby-desk {
            width: 70%;
            height: 100px;
            background: #8d6e63;
            border: 4px solid #6d4c41;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            position: absolute;
            bottom: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .doctor-avatar {
            font-size: 120px;
            position: absolute;
            bottom: 90px;
            left: 20%;
            animation: float 4s infinite ease-in-out;
            cursor: pointer;
        }

        .doctor-avatar:hover {
            animation: wave 0.5s ease-in-out 3;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        .clinic-poster {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 130px;
            height: 100px;
            background: white;
            border: 4px solid #4db6ac;
            border-radius: 8px;
            padding: 8px;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: var(--transition);
        }

        .clinic-poster:hover {
            transform: scale(1.1) rotate(2deg);
        }

        /* Scene 5: Tool Explorer */
        .visual-exam-table {
            width: 100%;
            height: 100%;
            background: #e0f7fa;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .exam-table {
            width: 320px;
            height: 45px;
            background: #cfd8dc;
            border: 3px solid #b0bec5;
            border-radius: 8px;
            position: absolute;
            bottom: 80px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .exam-table-legs {
            position: absolute;
            bottom: 0;
            width: 300px;
            height: 80px;
            display: flex;
            justify-content: space-between;
        }

        .exam-table-legs::before, .exam-table-legs::after {
            content: '';
            width: 14px;
            height: 80px;
            background: #b0bec5;
        }

        .cat-exam {
            font-size: 100px;
            position: absolute;
            bottom: 115px;
            transition: var(--transition);
        }

        /* SVG Stethoscope pulse */
        .pulse-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pulse-overlay.active {
            opacity: 1;
        }

        .pulse-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid var(--accent);
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: pulse-ring 1.5s infinite ease-out;
        }

        @keyframes pulse-ring {
            0% { width: 80px; height: 80px; opacity: 1; }
            100% { width: 220px; height: 220px; opacity: 0; }
        }

        .thermometer-bar-container {
            position: absolute;
            top: 30px;
            width: 24px;
            height: 120px;
            background: #eee;
            border-radius: 12px;
            border: 3px solid #bbb;
            overflow: hidden;
            display: none;
            flex-direction: column-reverse;
        }

        .thermometer-fill {
            width: 100%;
            height: 0%;
            background: #ff1744;
            transition: height 1s ease-out;
        }

        /* Tool Grid Widget (Scene 5 Right Side / Content Side) */
        .tool-explorer-widget {
            margin-top: 15px;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .tool-card {
            background: var(--primary-light);
            border: 3px solid #c8e6c9;
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .tool-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tool-card.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .tool-card-icon {
            font-size: 28px;
        }

        .tool-card-name {
            font-size: 13px;
            font-weight: 700;
        }

        .tool-desc-box {
            background: var(--accent-light);
            border-left: 5px solid var(--accent);
            padding: 15px;
            border-radius: 0 16px 16px 0;
            font-size: 15px;
            line-height: 1.4;
            min-height: 80px;
            animation: fadeIn 0.3s ease;
        }

        /* Scene 6: Animal Diagnostic Chart */
        .animal-tabs {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 20px;
        }

        .animal-tab {
            flex: 1;
            background: #eceff1;
            border: 2px solid #cfd8dc;
            border-radius: 16px;
            padding: 10px 5px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            font-size: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .animal-tab span {
            font-size: 12px;
            font-weight: 700;
            color: #37474f;
        }

        .animal-tab:hover {
            background: #e2f1f8;
            border-color: #90caf9;
        }

        .animal-tab.active {
            background: #e3f2fd;
            border-color: #2196f3;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.2);
        }

        .diagnostic-card {
            background: white;
            border: 3px solid #e3f2fd;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.03);
            animation: fadeIn 0.4s ease;
        }

        .diag-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #bbdefb;
            padding-bottom: 10px;
        }

        .diag-emoji {
            font-size: 45px;
            background: #e3f2fd;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .diag-title-area h4 {
            font-size: 20px;
            color: #1976d2;
        }

        .diag-title-area p {
            font-size: 14px;
            color: #ef5350;
            font-weight: bold;
        }

        .diag-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 14px;
        }

        .diag-field {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .diag-field strong {
            color: var(--primary-dark);
            display: block;
            margin-bottom: 4px;
        }

        /* Scene 7: Treatment */
        .treatment-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .treat-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3);
            transition: var(--transition);
            font-family: inherit;
        }

        .treat-btn:hover:not(:disabled) {
            background: #0d47a1;
            transform: translateY(-2px);
        }

        .treat-btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Syringe Drop animation */
        .syringe-tool {
            font-size: 60px;
            position: absolute;
            top: 40px;
            right: 30%;
            transform: rotate(-45deg);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .drop {
            position: absolute;
            font-size: 24px;
            top: 100px;
            right: 38%;
            opacity: 0;
        }

        .animate-treatment .syringe-tool {
            animation: showSyringe 1.5s ease-in-out forwards;
        }

        .animate-treatment .drop {
            animation: drip 1.5s ease-in-out forwards;
        }

        @keyframes showSyringe {
            0% { opacity: 0; transform: translate(50px, -50px) rotate(-45deg); }
            30% { opacity: 1; transform: translate(0, 0) rotate(-45deg); }
            70% { opacity: 1; transform: translate(0, 5px) rotate(-45deg); }
            100% { opacity: 0; transform: translate(50px, -50px) rotate(-45deg); }
        }

        @keyframes drip {
            0%, 40% { opacity: 0; transform: translateY(0); }
            50% { opacity: 1; }
            70% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 0; }
        }

        /* Scene 8: Pet Care Simulator */
        .care-simulator {
            margin-top: 15px;
        }

        .care-checklist {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .care-item {
            background: #f1f8e9;
            border: 2px solid #d0e7b5;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: var(--transition);
        }

        .care-item:hover {
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .care-item.checked {
            background: #e8f5e9;
            border-color: #81c784;
            color: var(--primary-dark);
            text-decoration: none;
        }

        .care-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .care-emoji {
            font-size: 24px;
        }

        .care-checkbox {
            width: 24px;
            height: 24px;
            border: 3px solid #81c784;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary);
            transition: var(--transition);
        }

        .care-item.checked .care-checkbox {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .meter-container {
            width: 100%;
            background: #e0e0e0;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            align-items: center;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #81c784 0%, #4caf50 100%);
            transition: width 0.5s ease-out;
        }

        .meter-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #37474f;
            z-index: 5;
        }

        .care-visual-overlay {
            position: absolute;
            font-size: 80px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .care-visual-overlay.active {
            animation: showCareEffect 1.2s ease-in-out forwards;
        }

        @keyframes showCareEffect {
            0% { opacity: 0; transform: scale(0.5) translateY(0); }
            20% { opacity: 1; transform: scale(1) translateY(-20px); }
            80% { opacity: 1; transform: scale(1) translateY(-20px) rotate(10deg); }
            100% { opacity: 0; transform: scale(0.5) translateY(-50px); }
        }

        /* Sparkles for healthy/happy */
        .sparkle-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            display: none;
        }

        .sparkle-particles.active {
            display: block;
        }

        .sparkle {
            position: absolute;
            font-size: 24px;
            animation: fly-sparkle 1.5s infinite ease-out;
        }

        @keyframes fly-sparkle {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 0; }
        }

        /* Scene 9: Ending Ceria */
        .replay-btn {
            background: #e91e63;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 18px;

        /* Confetti */

        /* Responsiveness */

                            <p>Rara merasa sangat kagum melihat bagaimana Dokter Hewan memulihkan kesehatan hewan-hewan lucu yang menderita sakit.</p>

                speechText: "Milo kini sudah sembuh total dan kembali aktif bermain mengejar bola kecil bersama Rara seperti sedia kala! Rara merasa sangat kagum melihat bagaimana Dokter Hewan memulihkan kesehatan hewan-hewan lucu yang menderita sakit. Rara tersenyum lebar dan bertekad: Jadi Dokter Hewan Itu Hebat! Aku ingin belajar giat agar kelak bisa menjadi dokter hewan yang menolong banyak hewan!",
                renderVisual: () => `

                        <div id="ending-cat" class="cat" style="animation: bounce 0.6s infinite ease-in-out; bottom:40px; left:40%;">🐱👑</div>

                `,
                initVisual: () => {
                    // Create confetti shower effect
                    const confContainer = document.getElementById('ending-confetti');
                    const colors = ['#f44336', '#e91e63', '#9c27b0', '#3f51b5', '#00bcd4', '#4caf50', '#ffeb3b', '#ff9800'];
                    for (let i = 0; i < 40; i++) {
                        const piece = document.createElement('div');
                        piece.className = 'confetti-piece';
                        piece.style.left = `${Math.random() * 100}%`;
                        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                        piece.style.animationDelay = `${Math.random() * 2}s`;
                        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
                        confContainer.appendChild(piece);

                renderWidget: () => `

        let currentScene = 1;
        let exploredTools = { stetoskop: false, termometer: false, suntikan: false, perban: false, kandang: false, timbangan: false };
        let completedCareCount = 0;
        let isSpeaking = false;
        let currentUtterance = null;
        let autoVoiceoverEnabled = true;

        // Sync local auto-voice setting
        document.getElementById('auto-voice-switch').addEventListener('change', (e) => {
            autoVoiceoverEnabled = e.target.checked;
        });

        function toggleAutoVoiceHome() {
            const checkbox = document.getElementById('auto-voice-switch');
            checkbox.checked = !checkbox.checked;
            autoVoiceoverEnabled = checkbox.checked;
        }

        // Initialize Web Speech Synthesis voices
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        function startStory() {
            const homeScreen = document.getElementById('home-screen');
            const storyScreen = document.getElementById('story-screen');
            
            // Fade out homepage
            homeScreen.style.opacity = '0';
            setTimeout(() => {
                homeScreen.style.display = 'none';
                storyScreen.style.display = 'flex';
                displayScene(1);
            }, 500);
        }

        function displayScene(sceneId) {
            currentScene = sceneId;
            const scene = scenes[sceneId - 1];

            // Render static texts
            document.getElementById('scene-title-heading').innerText = scene.title;
            document.getElementById('scene-narrative-content').innerHTML = scene.narrative;
            
            // Render visual area
            const visualContainer = document.getElementById('illustration-container');
            visualContainer.innerHTML = scene.renderVisual();
            
            // Render additional interactive widget if any
            const widgetContainer = document.getElementById('interactive-controls-container');
            if (scene.renderWidget) {
                widgetContainer.innerHTML = scene.renderWidget();
                widgetContainer.style.display = 'block';
            } else {
                widgetContainer.innerHTML = '';
                widgetContainer.style.display = 'none';
            }

            // Run initializations for visuals
            scene.initVisual();

            // Update Navigation Buttons State
            document.getElementById('prev-btn').disabled = (sceneId === 1);
            
            // For Scene 5: cannot click next until they click the tools (Pedagogical requirement)
            updateNextButtonState();

            // Stop speech if speaking
            stopAudio();

            // Automatically read scene text if voiceover is enabled
            if (autoVoiceoverEnabled) {
                // Short timeout to let transition complete and allow screen readers to sync
                setTimeout(() => {
                    speakNarrative(scene.speechText);
                }, 400);
            }
        }

        function checkAllToolsExplored() {
            const allClicked = Object.values(exploredTools).every(val => val === true);
            if (allClicked) {
                const desc = document.getElementById('tool-desc');
                desc.style.backgroundColor = '#e8f5e9';
                desc.style.borderLeftColor = 'var(--primary)';
                desc.innerHTML = '<strong>✨ Selamat!</strong> Rara telah mengenal semua alat medis dokter hewan dengan baik. Silakan klik tombol <b>Lanjut</b> untuk menegakkan diagnosis.';
                updateNextButtonState();
            }
        }

        function updateNextButtonState() {
            const nextBtn = document.getElementById('next-btn');
            if (currentScene === 5) {
                const allClicked = Object.values(exploredTools).every(val => val === true);
                nextBtn.disabled = !allClicked;
                if (!allClicked) {
                    nextBtn.title = "Silakan jelajahi semua alat medis dokter hewan terlebih dahulu!";
                } else {
                    nextBtn.title = "";
                }
            } else {
                nextBtn.disabled = (currentScene === scenes.length);
                nextBtn.title = "";
            }
        }

        function nextScene() {
            if (currentScene < scenes.length) {
                // If scene 5, double check tools checked
                if (currentScene === 5) {
                    const allClicked = Object.values(exploredTools).every(val => val === true);
                    if (!allClicked) {
                        alert("Kamu harus mengenal semua alat dokter hewan terlebih dahulu sebelum melanjutkan!");
                        return;
                    }
                }
                displayScene(currentScene + 1);
            }
        }

        function previousScene() {
            if (currentScene > 1) {
                displayScene(currentScene - 1);
            }
        }

        function resetStory() {
            // Reset state
            exploredTools = { stetoskop: false, termometer: false, suntikan: false, perban: false, kandang: false, timbangan: false };
            completedCareCount = 0;
            
            // Show Home Screen
            const homeScreen = document.getElementById('home-screen');
            const storyScreen = document.getElementById('story-screen');
            
            stopAudio();
            
            storyScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
            homeScreen.style.opacity = '1';
        }

        // Custom Helper to Show Speech Bubble over Cat
        function showSpeechBubble(element, text) {
            const bubble = document.getElementById('speech-bubble');
            if (bubble) {
                bubble.innerText = text;
                bubble.classList.add('show');
                setTimeout(() => {
                    bubble.classList.remove('show');
                }, 1800);
            }
        }

        // --- AUDIO / SPEECH SYNTHESIS ENGINE ---
        function speakNarrative(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Terminate current speech

                currentUtterance = new SpeechSynthesisUtterance(text);
                currentUtterance.lang = 'id-ID';
                currentUtterance.rate = 0.95; // Slightly relaxed pace for kids

                // Select Indonesian voice if found
                const voices = window.speechSynthesis.getVoices();
                const indVoice = voices.find(voice => voice.lang.includes('id') || voice.lang.includes('ID'));
                if (indVoice) {
                    currentUtterance.voice = indVoice;
                }

                currentUtterance.onstart = () => {
                    isSpeaking = true;
                    const audioBtn = document.getElementById('audio-speak-btn');
                    audioBtn.classList.add('speaking');
                    audioBtn.innerText = '⏹️';
                    audioBtn.title = 'Hentikan Suara';
                };

                currentUtterance.onend = () => {
                    isSpeaking = false;
                    const audioBtn = document.getElementById('audio-speak-btn');
                    audioBtn.classList.remove('speaking');
                    audioBtn.innerText = '🔊';
                    audioBtn.title = 'Putar Audio Narasi';
                };

                currentUtterance.onerror = () => {
                    isSpeaking = false;
                    const audioBtn = document.getElementById('audio-speak-btn');
                    audioBtn.classList.remove('speaking');
                    audioBtn.innerText = '🔊';
                };

                window.speechSynthesis.speak(currentUtterance);
            }
        }

        function stopAudio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            isSpeaking = false;
            const audioBtn = document.getElementById('audio-speak-btn');
            if (audioBtn) {
                audioBtn.classList.remove('speaking');
                audioBtn.innerText = '🔊';
                audioBtn.title = 'Putar Audio Narasi';
            }
        }

        function toggleAudio() {
            if (isSpeaking) {
                stopAudio();
            } else {
                const currentSceneObj = scenes[currentScene - 1];
                speakNarrative(currentSceneObj.speechText);
            }
        }

        // Key Listeners for Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextScene();
            }
            if (e.key === 'ArrowLeft') {
                previousScene();
            }
        });
    </script>
