<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebatnya Menjadi Dokter Hewan - Interactive Storybook</title>
    <meta name="description"
        content="Petualangan interaktif Rara dan Milo belajar tentang pentingnya profesi Dokter Hewan yang merawat dan mengobati berbagai hewan peliharaan.">
    <!-- Google Fonts for child-friendly typography -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4caf50;
            --primary-light: #e8f5e9;
            --primary-dark: #2e7d32;
            --accent: #ff9800;
            --accent-light: #fff3e0;
            --accent-dark: #e65100;
            --bg-gradient: linear-gradient(135deg, #fffde7 0%, #e8f5e9 100%);
            --card-bg: rgba(255, 255, 255, 0.96);
            --font-main: 'Fredoka', 'Comic Sans MS', sans-serif;
            --shadow: 0 16px 36px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--primary-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- HOMEPAGE STYLES --- */
        #home-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFF9E6 0%, #E8F5E9 50%, #E0F2F1 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .home-card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08);
            max-width: 620px;
            width: 100%;
            border: 6px solid white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .home-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.12);
        }

        .home-emoji {
            font-size: 96px;
            margin-bottom: 24px;
            filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.1));
            animation: float 3.5s infinite ease-in-out;
        }

        .home-title {
            font-size: 40px;
            color: var(--primary-dark);
            margin-bottom: 12px;
            line-height: 1.25;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), #1b5e20);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .home-subtitle {
            font-size: 22px;
            color: #558b2f;
            margin-bottom: 35px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .home-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
        }

        .start-btn {
            padding: 18px 50px;
            font-size: 26px;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.35);
            transition: var(--transition);
            font-family: inherit;
        }

        .start-btn:hover {
            transform: scale(1.05) translateY(-3px);
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
            box-shadow: 0 15px 30px rgba(76, 175, 80, 0.45);
        }

        /* Auto-voiceover Switch */
        .voice-toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 16px;
            color: #37474f;
            cursor: pointer;
            user-select: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        /* --- STORY SCREEN STYLES --- */
        #story-screen {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeInStory 0.5s forwards;
            padding: 20px;
        }

        @keyframes fadeInStory {
            to {
                opacity: 1;
            }
        }

        .container {
            width: 95vw;
            height: 90vh;
            max-width: 1200px;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            border: 6px solid white;
            position: relative;
        }

        /* Split Layout */
        .illustration-side {
            flex: 1.35;
            background: linear-gradient(135deg, #f1f8e9, #e8f5e9);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-right: 4px solid #a5d6a7;
            overflow: hidden;
        }

        .text-side {
            flex: 0.65;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: white;
            overflow: hidden;
        }

        #text-scroll-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            padding-right: 6px;
        }

        /* Custom scrollbar for text scroll container */
        #text-scroll-container::-webkit-scrollbar {
            width: 8px;
        }
        #text-scroll-container::-webkit-scrollbar-track {
            background: #f1f8e9;
            border-radius: 4px;
        }
        #text-scroll-container::-webkit-scrollbar-thumb {
            background: #a5d6a7;
            border-radius: 4px;
        }
        #text-scroll-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Decorative Floating Emojis on Homepage */
        .floating-deco {
            position: absolute;
            font-size: 56px;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.06));
            user-select: none;
            pointer-events: none;
            opacity: 0.18;
            z-index: 1;
        }
        
        .deco-1 { top: 10%; left: 8%; animation: float-slow 6s infinite ease-in-out; }
        .deco-2 { bottom: 12%; right: 8%; animation: float-slow 7s infinite ease-in-out 1s; }
        .deco-3 { top: 15%; right: 10%; animation: float-slow 8s infinite ease-in-out 2s; }
        .deco-4 { bottom: 15%; left: 10%; animation: float-slow 5s infinite ease-in-out 1.5s; }
        .deco-5 { top: 52%; left: 5%; animation: float-slow 9s infinite ease-in-out 0.5s; font-size: 38px; }
        .deco-6 { top: 48%; right: 5%; animation: float-slow 7.5s infinite ease-in-out 2.5s; font-size: 38px; }

        @keyframes float-slow {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(15deg);
            }
        }

        /* --- IMAGE VIEWER & FALLBACKS --- */
        .scene-image-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-fallback {
            position: absolute;
            top: 15px;
            left: 15px;
            width: calc(100% - 30px);
            height: calc(100% - 30px);
            background: linear-gradient(135deg, #f5f7fa 0%, #e4ecf7 100%);
            border: 4px dashed #90a4ae;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            color: #37474f;
            box-sizing: border-box;
            z-index: 1;
        }

        .fallback-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fallback-details {
            font-size: 14px;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #cfd8dc;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 15px;
            max-width: 90%;
        }

        .fallback-hint {
            font-size: 12px;
            color: #78909c;
            font-style: italic;
            max-width: 85%;
        }

        /* --- NARRATIVE TYPOGRAPHY --- */
        .fade-in-text {
            animation: fadeInTextEffect 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        @keyframes fadeInTextEffect {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scene-title {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 8px;
            border-bottom: 3px dashed #c8e6c9;
            padding-bottom: 6px;
            font-weight: 700;
        }

        .narrative-text {
            font-size: 15.5px;
            line-height: 1.5;
            color: #37474f;
            margin-bottom: 12px;
        }

        .narrative-text p {
            margin-bottom: 6px;
        }

        /* --- NAVIGATION CONTROLS --- */
        .controls {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 10px;
            border-top: 2px solid #f1f8e9;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .audio-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3);
            transition: var(--transition);
        }

        .audio-btn:hover {
            transform: scale(1.1);
            background: var(--accent-dark);
            box-shadow: 0 6px 15px rgba(255, 152, 0, 0.4);
        }

        .audio-btn.speaking {
            animation: pulse-orange 1.5s infinite;
            background: #e65100;
        }

        .audio-warning {
            display: none;
            font-size: 13px;
            color: #d32f2f;
            background: #ffebee;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #ffcdd2;
            margin-top: 5px;
            font-weight: 500;
        }

        @keyframes pulse-orange {
            0% {
                box-shadow: 0 0 0 0 rgba(230, 81, 0, 0.6);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(230, 81, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(230, 81, 0, 0);
            }
        }

        .navigation {
            display: flex;
            gap: 15px;
        }

        .nav-button {
            padding: 12px 28px;
            font-size: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 700;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.3);
        }

        .nav-button:disabled {
            background: #cfd8dc;
            color: #90a4ae;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* --- VISUAL INTERACTIVE OVERLAYS --- */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .interactive-element {
            pointer-events: auto;
            cursor: pointer;
            position: absolute;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes wobble {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-8deg);
            }

            75% {
                transform: rotate(8deg);
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .click-hint {
            position: absolute;
            bottom: 20px;
            font-size: 15px;
            color: var(--primary-dark);
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 16px;
            border-radius: 20px;
            border: 2px dashed var(--primary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            animation: pulse-hint 1.5s infinite;
            z-index: 6;
            pointer-events: none;
        }

        @keyframes pulse-hint {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        /* Scene 2 Overlays: Toy Ball */
        .ball-overlay {
            font-size: 55px;
            bottom: 60px;
            right: 20%;
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .ball-roll-animation {
            transform: translate(-180px, -20px) rotate(-720deg);
        }

        .cat-chase-overlay {
            font-size: 90px;
            bottom: 50px;
            left: 20%;
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .cat-chase-animation {
            transform: translate(140px, -30px);
        }

        /* Scene 3 Overlays: Food Bowl */
        .bowl-overlay {
            font-size: 45px;
            bottom: 70px;
            right: 25%;
        }

        .shake-animation {
            animation: wobble 0.5s ease-in-out 2;
        }

        /* Scene 4 Overlays: Basket */
        .basket-overlay {
            font-size: 100px;
            bottom: 50px;
            left: calc(50% - 50px);
            animation: float 4s infinite ease-in-out;
        }

        /* Scene 6 Overlays: Heartbeat, Temp, Syringe */
        .pulse-overlay {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pulse-overlay.active {
            opacity: 1;
        }

        .pulse-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid var(--accent);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: pulse-ring 1.5s infinite ease-out;
        }

        @keyframes pulse-ring {
            0% {
                width: 60px;
                height: 60px;
                opacity: 1;
            }

            100% {
                width: 180px;
                height: 180px;
                opacity: 0;
            }
        }

        .thermometer-bar-container {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 24px;
            height: 120px;
            background: #eee;
            border-radius: 12px;
            border: 3px solid #bbb;
            overflow: hidden;
            display: none;
            flex-direction: column-reverse;
            z-index: 10;
        }

        .thermometer-fill {
            width: 100%;
            height: 0%;
            background: #ff1744;
            transition: height 1s ease-out;
        }

        .syringe-tool {
            font-size: 60px;
            position: absolute;
            top: 40px;
            right: 30%;
            transform: rotate(-45deg);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .drop {
            position: absolute;
            font-size: 24px;
            top: 100px;
            right: 38%;
            opacity: 0;
        }

        .animate-treatment .syringe-tool {
            animation: showSyringe 1.5s ease-in-out forwards;
        }

        .animate-treatment .drop {
            animation: drip 1.5s ease-in-out forwards;
        }

        @keyframes showSyringe {
            0% {
                opacity: 0;
                transform: translate(50px, -50px) rotate(-45deg);
            }

            30% {
                opacity: 1;
                transform: translate(0, 0) rotate(-45deg);
            }

            70% {
                opacity: 1;
                transform: translate(0, 5px) rotate(-45deg);
            }

            100% {
                opacity: 0;
                transform: translate(50px, -50px) rotate(-45deg);
            }
        }

        @keyframes drip {

            0%,
            40% {
                opacity: 0;
                transform: translateY(0);
            }

            50% {
                opacity: 1;
            }

            70% {
                opacity: 0;
                transform: translateY(50px);
            }

            100% {
                opacity: 0;
            }
        }

        /* --- INTERACTIVE WIDGETS --- */
        .widget-wrapper {
            margin-top: 15px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tool Grid Widget (Scene 6) */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .tool-card {
            background: var(--primary-light);
            border: 3px solid #c8e6c9;
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .tool-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .tool-card.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        .tool-card-icon {
            font-size: 28px;
        }

        .tool-card-name {
            font-size: 13px;
            font-weight: 700;
        }

        .tool-desc-box {
            background: var(--accent-light);
            border-left: 5px solid var(--accent);
            padding: 15px;
            border-radius: 0 16px 16px 0;
            font-size: 15px;
            line-height: 1.4;
            min-height: 80px;
        }

        /* Animal Diagnostic Tabs (Scene 7) */
        .animal-tabs {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 20px;
        }

        .animal-tab {
            flex: 1;
            background: #eceff1;
            border: 2px solid #cfd8dc;
            border-radius: 16px;
            padding: 10px 5px;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            font-size: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .animal-tab span {
            font-size: 11px;
            font-weight: 700;
            color: #37474f;
        }

        .animal-tab:hover {
            background: #e2f1f8;
            border-color: #90caf9;
        }

        .animal-tab.active {
            background: #e3f2fd;
            border-color: #2196f3;
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.15);
        }

        .diagnostic-card {
            background: white;
            border: 3px solid #e3f2fd;
            border-radius: 20px;
            padding: 15px 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.02);
        }

        .diag-header h4 {
            font-size: 20px;
            color: #1976d2;
            margin-bottom: 5px;
        }

        .diag-header p {
            font-size: 14px;
            color: #ef5350;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .diag-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 14px;
        }

        .diag-field {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .diag-field strong {
            color: var(--primary-dark);
            display: block;
            margin-bottom: 4px;
        }

        /* Treatment Button Widget (Scene 8) */
        .treatment-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .treat-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3);
            transition: var(--transition);
            font-family: inherit;
        }

        .treat-btn:hover:not(:disabled) {
            background: #0d47a1;
            transform: translateY(-2px);
        }

        .treat-btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Pet Care Guide Widget (Scene 8) */
        .care-guide-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .care-guide-item {
            background: #f1f8e9;
            border: 2px solid #d0e7b5;
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }

        .care-guide-item:hover {
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .care-guide-icon {

                renderVisual: () => `
                    <div class="scene-image-wrapper">
                        <img class="scene-img" src="assets/images/scane7.jpg" alt="Milo Diberi Obat" onerror="handleImageError(this, 'scane7.jpg', 'Halaman 7: Milo Mendapat Pengobatan', 'Dokter dengan hati-hati memegang pipet obat menyuapi Milo obat. Milo terlihat tenang menurut. Rara tersenyum senang.')">
                    </div>
                `,
                initVisual: () => {}
            },
            {
                id: 8,
                title: "Halaman 8: Belajar Merawat Kucing",
                imageSrc: "scane8.jpg",
                audioSrc: "assets/audio/scene8.mp3",
                visualDesc: "Dokter memegang selembar brosur bergambar tips merawat kucing: makanan sehat, air bersih, kebersihan kandang. Rara menyimaknya.",
                narrative: `<p>Sebelum pulang, dokter memberikan beberapa tips kepada Rara.</p>
                            <p>“Kucing perlu makanan yang sehat dan air minum yang bersih,” jelas dokter.</p>
                            <p>“Selain itu, kebersihan tubuh and tempat tinggalnya juga harus dijaga.”</p>
                            <p>Rara mengangguk.</p>
                            <p>“Aku akan merawat Milo dengan baik,” katanya.</p>
                            <p>Dokter tersenyum bangga.</p>
                            <p style="font-weight:bold; color:var(--accent-dark); margin-top:10px;">🧼 Simak panduan merawat Milo di bawah ini agar selalu sehat!</p>`,
                renderVisual: () => `
                    <div class="scene-image-wrapper">
                        <img class="scene-img" src="assets/images/scane8.jpg" alt="Tips Merawat Kucing" onerror="handleImageError(this, 'scane8.jpg', 'Halaman 8: Belajar Merawat Kucing', 'Dokter memegang selembar brosur bergambar tips merawat kucing: makanan sehat, air bersih, kebersihan kandang. Rara menyimaknya.')">
                    </div>
                `,
                initVisual: () => { },
                renderWidget: () => `
                    <div class="widget-wrapper">
                        <div class="care-guide-container">
                            <div class="care-guide-item">
                                <span class="care-guide-icon">🥩</span>
                                <div class="care-guide-text">
                                    <strong>Makanan & Air Bersih:</strong> Beri makanan bernutrisi dan air bersih setiap hari agar Milo tetap berenergi.
                                </div>
                            </div>
                            <div class="care-guide-item">
                                <span class="care-guide-icon">🧹</span>
                                <div class="care-guide-text">
                                    <strong>Kebersihan Tempat Tinggal:</strong> Jaga kebersihan kandang and pasir tempat kotorannya secara teratur.
                                </div>
                            </div>
                            <div class="care-guide-item">
                                <span class="care-guide-icon">🧼</span>
                                <div class="care-guide-text">
                                    <strong>Perawatan Tubuh:</strong> Mandikan secara berkala dan sisir bulunya agar bersih dari debu dan kutu.
                                </div>
                            </div>
                            <div class="care-guide-item">
                                <span class="care-guide-icon">🧸</span>
                                <div class="care-guide-text">
                                    <strong>Bermain & Kasih Sayang:</strong> Ajak bermain secara aktif and berikan perhatian penuh agar Milo senang.
                                </div>
                            </div>
                            <div class="care-guide-item">
                                <span class="care-guide-icon">🩺</span>
                                <div class="care-guide-text">
                                    <strong>Kesehatan Rutin:</strong> Periksakan kesehatannya ke dokter hewan secara berkala untuk pencegahan penyakit.
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 9,
                title: "Halaman 9: Milo Sehat Kembali",
                imageSrc: "scane9.mp4",
                audioSrc: "assets/audio/scene9.mp3",
                visualDesc: "Suasana cerah di rumah, Milo berlari melompat ceria mengejar bola. Rara tertawa gembira melihat kucingnya sehat kembali.",
                narrative: `<p>Beberapa hari kemudian, Milo sudah kembali sehat.</p>
                            <p>Ia berlari ke sana kemari dan bermain seperti biasanya.</p>
                            <p>“Milo sudah sembuh!” seru Rara dengan gembira.</p>
                            <p>Milo mengeong keras seolah ikut merasa senang.</p>
                            <p>Rara sangat bahagia melihat sahabat kecilnya sehat kembali.</p>
                            <p style="font-weight:bold; font-size:19px; color:var(--primary-dark); text-align:center; margin-top:20px;">🏆 Tamat 🏆</p>`,
                renderVisual: () => `
                    <div class="scene-image-wrapper">
                        <video class="scene-img" id="scene9-video" autoplay muted loop playsinline>
                            <source src="assets/images/scane9.mp4" type="video/mp4">
                            Browser Anda tidak mendukung pemutaran video.
                        </video>
                        <img class="scene-img" id="scene9-img" src="" alt="Milo Sehat Kembali" style="display: none;">
                        <div class="overlay-container">
                            <div class="confetti-container active" id="ending-confetti"></div>
                        </div>
                    </div>
                `,
                initVisual: () => {
                    const video = document.getElementById('scene9-video');
                    const img = document.getElementById('scene9-img');
                    
                    const triggerFallback = () => {
                        if (img && !img.src) {
                            video.style.display = 'none';
                            img.style.display = 'block';
                            img.src = "assets/images/scene9.png";
                            img.onerror = function () {
                                handleImageError(this, 'scene9.png', 'Halaman 9: Milo Sehat Kembali', 'Suasana cerah di rumah, Milo berlari melompat ceria mengejar bola. Rara tertawa gembira melihat kucingnya sehat kembali.');
                            };
                        }
                    };

                    if (video) {
                        video.addEventListener('error', triggerFallback);
                    }

                    const confContainer = document.getElementById('ending-confetti');
                    if (confContainer) {
                        const colors = ['#f44336', '#e91e63', '#9c27b0', '#3f51b5', '#00bcd4', '#4caf50', '#ffeb3b', '#ff9800'];
                        for (let i = 0; i < 35; i++) {
                            const piece = document.createElement('div');
                            piece.className = 'confetti-piece';
                            piece.style.left = `${Math.random() * 100}%`;
                            piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                            piece.style.animationDelay = `${Math.random() * 2}s`;
                            piece.style.transform = `rotate(${Math.random() * 360}deg)`;
                            confContainer.appendChild(piece);
                        }
                    }
                },
                renderWidget: () => `
                    <div class="widget-wrapper" style="display:flex; justify-content:center;">
                        <button class="replay-btn" onclick="resetStory()">Mulai Cerita Lagi 🔄</button>
                    </div>
                `
            }
        ];

        let currentScene = 1;
        let exploredTools = { stetoskop: false, termometer: false, suntikan: false, perban: false, kandang: false, timbangan: false };
        let isAudioPlaying = false;
        let autoPlayAudio = true;
        const audioPlayer = document.getElementById('story-audio');
        const audioBtn = document.getElementById('audio-speak-btn');
        const audioWarning = document.getElementById('audio-warning');

        // Autoplay listener setup
        document.getElementById('auto-voice-switch').addEventListener('change', (e) => {
            autoPlayAudio = e.target.checked;
        });

        function toggleAutoVoiceHome() {
            const checkbox = document.getElementById('auto-voice-switch');
            if (checkbox) {
                checkbox.checked = !checkbox.checked;
                autoPlayAudio = checkbox.checked;
            }
        }

        // Image loading error fallback builder
        function handleImageError(imgElement, fileName, sceneTitle, visualDesc) {
            if (imgElement.dataset.fallbackRendered) return;
            imgElement.dataset.fallbackRendered = "true";

            const container = imgElement.parentElement;
            imgElement.style.display = 'none';

            const fallbackDiv = document.createElement('div');
            fallbackDiv.className = 'image-fallback';
            fallbackDiv.innerHTML = `
                <div class="fallback-title">🖼️ Gambar Sementara</div>
                <div style="font-size: 15px; margin-bottom: 12px; font-weight: 600; color: #455a64;">
                    Adegan: ${sceneTitle}
                </div>
                <div class="fallback-details">
                    File: assets/images/${fileName}<br>
                    Visual: "${visualDesc}"
                </div>
                <div class="fallback-hint">
                    Letakkan file gambar asli Anda dengan nama di atas ke dalam folder <strong>assets/images/</strong> untuk menggantikannya secara otomatis.
                </div>
            `;
            container.appendChild(fallbackDiv);
        }

        function startStory() {
            const homeScreen = document.getElementById('home-screen');
            const storyScreen = document.getElementById('story-screen');

            homeScreen.style.opacity = '0';
            setTimeout(() => {
                homeScreen.style.display = 'none';
                storyScreen.style.display = 'flex';
                displayScene(1);
            }, 500);
        }

        function displayScene(sceneId) {
            currentScene = sceneId;
            const scene = scenes[sceneId - 1];

            // Trigger fade-in animation for text content
            const textWrapper = document.getElementById('text-content-wrapper');
            if (textWrapper) {
                textWrapper.classList.remove('fade-in-text');
                void textWrapper.offsetWidth; // Trigger reflow to restart CSS animation
                textWrapper.classList.add('fade-in-text');
            }

            // Injeksi teks judul dan narasi
            document.getElementById('scene-title-heading').innerText = scene.title;
            document.getElementById('scene-narrative-content').innerHTML = scene.narrative;

            // Injeksi area visual
            const visualContainer = document.getElementById('illustration-container');
            visualContainer.innerHTML = scene.renderVisual();

            // Injeksi widget interaksi
            const widgetContainer = document.getElementById('interactive-controls-container');
            if (scene.renderWidget) {
                widgetContainer.innerHTML = scene.renderWidget();
                widgetContainer.style.display = 'block';
            } else {
                widgetContainer.innerHTML = '';
                widgetContainer.style.display = 'none';
            }

            // Inisialisasi logika visual adegan
            scene.initVisual();

            // Atur tombol kembali
            document.getElementById('prev-btn').disabled = (sceneId === 1);

            // Atur tombol lanjut
            updateNextButtonState();

            // Set sumber audio dan putar
            playAudioForScene(sceneId);
        }

        function playAudioForScene(sceneId) {
            audioWarning.style.display = 'none';
            audioPlayer.pause();

            const scene = scenes[sceneId - 1];
            audioPlayer.src = scene.audioSrc;
            audioPlayer.load();

            if (autoPlayAudio) {
                const playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        updateAudioButtonState(true);
                    }).catch(error => {
                        // Browser typically blocks autoplay on first load, which is expected
                        console.log("Autoplay ditunda atau file audio belum dimasukkan: ", error);
                        updateAudioButtonState(false);
                    });
                }
            } else {
                updateAudioButtonState(false);
            }
        }

        function toggleAudio() {
            if (isAudioPlaying) {
                audioPlayer.pause();
                updateAudioButtonState(false);
            } else {
                audioWarning.style.display = 'none';
                const playPromise = audioPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        updateAudioButtonState(true);
                    }).catch(error => {
                        console.warn("Gagal memutar audio: ", error);
                        audioWarning.innerText = `⚠️ Audio belum siap atau berkas tidak ditemukan: "${scenes[currentScene - 1].audioSrc}"`;
                        audioWarning.style.display = 'block';
                        updateAudioButtonState(false);
                    });
                }
            }
        }

        function updateAudioButtonState(playing) {
            isAudioPlaying = playing;
            if (playing) {
                audioBtn.classList.add('speaking');
                audioBtn.innerText = '⏹️';
                audioBtn.title = 'Hentikan Audio';
            } else {
                audioBtn.classList.remove('speaking');
                audioBtn.innerText = '🔊';
                audioBtn.title = 'Putar Audio Narasi';
            }
        }

        // Event listener audio selesai & error
        audioPlayer.addEventListener('ended', () => {
            updateAudioButtonState(false);
        });

        audioPlayer.addEventListener('error', (e) => {
            if (audioPlayer.src && isAudioPlaying) {
                updateAudioButtonState(false);
            }
        });

        function checkAllToolsExplored() {
            const allClicked = Object.values(exploredTools).every(val => val === true);
            if (allClicked) {
                const desc = document.getElementById('tool-desc');
                if (desc) {
                    desc.style.backgroundColor = '#e8f5e9';
                    desc.style.borderLeftColor = 'var(--primary)';
                    desc.innerHTML = '<strong>✨ Hebat!</strong> Rara telah mengenal semua alat medis dokter hewan dengan baik. Silakan klik tombol <b>Lanjut</b> untuk menegakkan diagnosis.';
                }
                updateNextButtonState();
            }
        }

        function updateNextButtonState() {
            const nextBtn = document.getElementById('next-btn');
            if (!nextBtn) return;

            nextBtn.disabled = (currentScene === scenes.length);
            nextBtn.title = "";
        }

        function nextScene() {
            if (currentScene < scenes.length) {
                displayScene(currentScene + 1);
            }
        }

        function previousScene() {
            if (currentScene > 1) {
                displayScene(currentScene - 1);
            }
        }

        function resetStory() {
            exploredTools = { stetoskop: false, termometer: false, suntikan: false, perban: false, kandang: false, timbangan: false };

            audioPlayer.pause();
            updateAudioButtonState(false);
            audioWarning.style.display = 'none';

            const homeScreen = document.getElementById('home-screen');
            const storyScreen = document.getElementById('story-screen');

            storyScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
            homeScreen.style.opacity = '1';
        }

        // Navigasi Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextScene();
            }
            if (e.key === 'ArrowLeft') {
                previousScene();
            }
        });
    </script>
</body>

</html>
